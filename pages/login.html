<body>

    <div id="topbar-root"></div>

    <div class="auth-page">
        <div class="glass auth-card">
            <div class="auth-title">Welcome back</div>
            <div class="auth-sub">Sign in to HelloQueue</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="your_username" autocomplete="username"
                        required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="current-password" required />
                </div>
                <div id="login-error"
                    style="color:var(--status-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
                <button type="submit" class="btn btn-primary w-full" id="login-btn">Sign in</button>
            </form>

            <hr class="divider" />
            <div class="text-sm text-muted" style="text-align:center;">
                Don't have an account? <a href="/register" class="auth-link">Register</a>
            </div>
        </div>
    </div>

    <div id="theme-modal-root"></div>
    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        import { initTheme, buildTopbar, saveAuth, getToken, api, toast } from '/script.js';
 
    initTheme();
    buildTopbar(document.getElementById('topbar-root'));
 
    // Already logged in?
    if (getToken()) window.location.href = '/dashboard';
 
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
 
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
 
      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: {
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          },
        });
 
        if (data.requires_totp) {
          // Store totp token, redirect to TOTP page
          sessionStorage.setItem('totp_token', data.totp_token);
          window.location.href = '/login/totp';
          return;
        }
 
        saveAuth(data.token, data.user);
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>


    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>
