    <meta charset="utf-8">
    <title>Login | GFTV HelloQueue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GFTV Virtual Queue Management System">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Login | GFTV HelloQueue" />
    <meta property="og:site_name" content="UwU Apps" />
    <meta property="og:description" content="GFTV Virtual Queue Management System" />

    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>

    <div id="topbar-root"></div>

    <div class="auth-page">
        <div class="glass auth-card">
            <div class="auth-title">Welcome back</div>
            <div class="auth-sub">Sign in to HelloQueue</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="your_username" autocomplete="username"
                        required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="current-password" required />
                </div>
                <div id="login-error"
                    style="color:var(--status-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
                <button type="submit" class="btn btn-primary w-full" id="login-btn">Sign in</button>
            </form>

            <hr class="divider" />
            <div class="text-sm text-muted" style="text-align:center;">
                Don't have an account? <a href="/register" class="auth-link">Register</a>
            </div>
        </div>
    </div>

    <!-- 2FA modal -->
    <div class="modal-overlay" id="totp-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Two-Factor Authentication</span>
            </div>
            <div style="padding:0 4px 4px;">
                <p class="text-sm text-muted" style="margin-bottom:16px;">Enter the 6-digit code from your authenticator app.</p>
                <div class="form-group">
                    <label for="totp-code" id="totp-code-label">Authentication Code</label>
                    <input type="text" id="totp-code" inputmode="numeric" pattern="[0-9 ]*"
                        maxlength="7" placeholder="000 000" autocomplete="one-time-code"
                        style="font-size:1.5rem;letter-spacing:0.15em;text-align:center;" />
                </div>
                <div style="text-align:center;margin-bottom:12px;">
                    <button type="button" class="btn btn-ghost btn-sm" id="totp-toggle-backup">Use a backup code instead</button>
                </div>
                <div id="totp-error" style="color:var(--status-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
                <label style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;cursor:pointer;font-size:0.875rem;">
                    <input type="checkbox" id="totp-trust-device" />
                    Trust this device for 30 days
                </label>
                <button class="btn btn-primary w-full" id="totp-submit-btn">Verify</button>
                <button class="btn btn-ghost w-full" id="totp-cancel-btn" style="margin-top:8px;">Back to login</button>
            </div>
        </div>
    </div>

    <div id="theme-modal-root"></div>
    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        import { initTheme, buildTopbar, saveAuth, getToken, api, toast } from '/script.js';

    initTheme();
    buildTopbar(document.getElementById('topbar-root'));

    if (getToken()) window.location.href = '/dashboard';

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    const totpModal = document.getElementById('totp-modal');
    const totpInput = document.getElementById('totp-code');
    const totpErr = document.getElementById('totp-error');
    const totpBtn = document.getElementById('totp-submit-btn');
    let pendingTotpToken = null;

    function openTotpModal(token) {
      pendingTotpToken = token;
      totpInput.value = '';
      totpErr.style.display = 'none';
      totpModal.classList.add('open');
      setTimeout(() => totpInput.focus(), 50);
    }

    function closeTotpModal() {
      totpModal.classList.remove('open');
      pendingTotpToken = null;
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }

    document.getElementById('totp-cancel-btn').addEventListener('click', closeTotpModal);

    let backupMode = false;
    const toggleBtn = document.getElementById('totp-toggle-backup');
    const codeLabel = document.getElementById('totp-code-label');

    toggleBtn.addEventListener('click', () => {
      backupMode = !backupMode;
      totpInput.value = '';
      if (backupMode) {
        totpInput.setAttribute('inputmode', 'text');
        totpInput.removeAttribute('pattern');
        totpInput.setAttribute('maxlength', '20');
        totpInput.placeholder = 'XXXX-XXXX-XXXX';
        totpInput.style.fontSize = '1.1rem';
        codeLabel.textContent = 'Backup Code';
        toggleBtn.textContent = 'Use authenticator app instead';
      } else {
        totpInput.setAttribute('inputmode', 'numeric');
        totpInput.setAttribute('pattern', '[0-9 ]*');
        totpInput.setAttribute('maxlength', '7');
        totpInput.placeholder = '000 000';
        totpInput.style.fontSize = '1.5rem';
        codeLabel.textContent = 'Authentication Code';
        toggleBtn.textContent = 'Use a backup code instead';
      }
      totpInput.focus();
    });

    // Auto-format as "000 000" in TOTP mode only
    totpInput.addEventListener('input', () => {
      if (backupMode) return;
      const digits = totpInput.value.replace(/\D/g, '').slice(0, 6);
      totpInput.value = digits.length > 3 ? digits.slice(0, 3) + ' ' + digits.slice(3) : digits;
    });

    totpBtn.addEventListener('click', async () => {
      const code = totpInput.value.replace(/\s/g, '');
      if (!backupMode && code.length !== 6) {
        totpErr.textContent = 'Please enter a 6-digit code';
        totpErr.style.display = 'block';
        return;
      }
      if (backupMode && code.length < 4) {
        totpErr.textContent = 'Please enter your backup code';
        totpErr.style.display = 'block';
        return;
      }
      totpErr.style.display = 'none';
      totpBtn.disabled = true;
      totpBtn.textContent = 'Verifying…';
      try {
        const trustDevice = document.getElementById('totp-trust-device').checked;
        const data = await api('/auth/totp-verify', {
          method: 'POST',
          body: { totp_token: pendingTotpToken, code, trust_device: trustDevice },
        });
        if (data.device_token) {
          localStorage.setItem('hq_device_token', data.device_token);
        }
        saveAuth(data.token, data.user);
        window.location.href = '/dashboard';
      } catch (err) {
        totpErr.textContent = err.message;
        totpErr.style.display = 'block';
        totpBtn.disabled = false;
        totpBtn.textContent = 'Verify';
        totpInput.select();
      }
    });

    totpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') totpBtn.click();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: {
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            device_token: localStorage.getItem('hq_device_token') || undefined,
          },
        });

        if (data.requires_totp) {
          openTotpModal(data.totp_token);
          return;
        }

        saveAuth(data.token, data.user);
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>


    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>

</html>
