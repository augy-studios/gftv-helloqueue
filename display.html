<body>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queue Display – HelloQueue</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="manifest" href="/manifest.json" />
    <style>
        @media (min-width: 769px) {
            body { overflow: hidden; }
        }

        .display-header h1 {
            font-size: 1.8rem;
        }

        .now-serving-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .serving-number-big {
            width: 100px;
            height: 100px;
            font-size: 3rem;
            border-radius: var(--radius);
            background: #e41f1f;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop-in 0.25s ease;
        }

        @keyframes pop-in {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .display-section-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }
    </style>
    </head>

    <body>
        <div class="display-page" id="display-root">
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;">
                <div class="loader"></div>
            </div>
        </div>

        <script type="module">
            import { initTheme, Icons } from '/script.js';
    initTheme();
 
    const parts = window.location.pathname.split('/').filter(Boolean);
    const eventCode = parts[1];
    const queueCode = parts[2];
 
    if (!eventCode || !queueCode) {
      document.getElementById('display-root').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:1.2rem;color:var(--text-muted);">
          Invalid display URL.
        </div>`;
    } else {
      let prevServing = [];
      let joinQR = null;
 
      generateJoinQR(`https://queue.gftv.asia/queue/${eventCode}/${queueCode}`).then(url => {
        joinQR = url;
      });
 
      async function generateJoinQR(url) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}`;
      }
 
      async function refresh() {
        try {
          const res = await fetch(`/api/display/${eventCode}/${queueCode}`);
          if (!res.ok) throw new Error('Queue not found');
          const data = await res.json();
          render(data);
        } catch (err) {
          document.getElementById('display-root').innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
              <div class="text-muted" style="text-align:center;">
                <div style="margin:8px 0;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div style="margin-top:10px;">${err.message}</div>
                <div class="text-sm" style="margin-top:6px;">Retrying…</div>
              </div>
            </div>`;
        }
      }
 
      function render(data) {
        const serving = data.serving || [];
        const serving_entries = data.serving_entries || [];
        const waiting = data.waiting || [];
        const missed  = data.missed  || [];
        const newlyServed = serving.filter(n => !prevServing.includes(n));
        prevServing = [...serving];
 
        const root = document.getElementById('display-root');
 
        // skip rebuild if already rendered
        const existingMain = document.getElementById('display-main');
        if (existingMain) {
          updateDisplay(data, serving, waiting, missed, newlyServed);
          return;
        }
 
        root.innerHTML = `
          <div class="display-main" id="display-main">
            <div class="display-header">
              <h1>${data.event?.name || 'Event'}</h1>
              <p>${data.queue?.name || 'Queue'} &nbsp;·&nbsp;
                <span class="status-pill ${data.queue?.status}">${data.queue?.status}</span>
              </p>
            </div>
 
            <div class="serving-block">
              <div class="now-serving-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Now Serving</div>
              <div id="serving-numbers" class="serving-numbers">
                ${renderServingNumbers(serving, serving_entries)}
              </div>
            </div>
 
            <div>
              <div class="display-section-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg> In Queue (${waiting.length})</div>
              <div id="waiting-numbers" class="waiting-row">
                ${waiting.map(n => `<div class="waiting-badge">${n}</div>`).join('') || '<span class="text-muted text-sm">Queue is empty</span>'}
              </div>
            </div>
 
            ${missed.length ? `
            <div>
              <div class="display-section-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Missed (${missed.length})</div>
              <div id="missed-numbers" class="missed-row">
                ${missed.map(n => `<div class="missed-badge">${n}</div>`).join('')}
              </div>
            </div>` : '<div id="missed-numbers"></div>'}
          </div>
 
          <!-- SIDEBAR -->
          <div class="display-sidebar">
            <div style="text-align:center;">
              <div style="font-size:1.5rem;">${data.event?.name || ''}</div>
              <div class="text-sm text-muted">${data.queue?.name || ''}</div>
            </div>
 
            <div class="display-stats">
              <div class="display-stat">
                <div class="display-stat-num" style="color:var(--status-serving);">${serving.length}</div>
                <div class="display-stat-label">Serving</div>
              </div>
              <div class="display-stat">
                <div class="display-stat-num" style="color:var(--status-waiting);">${waiting.length}</div>
                <div class="display-stat-label">Waiting</div>
              </div>
              <div class="display-stat">
                <div class="display-stat-num">${data.total_served || 0}</div>
                <div class="display-stat-label">Served</div>
              </div>
              <div class="display-stat">
                <div class="display-stat-num" style="color:var(--status-missed);">${missed.length}</div>
                <div class="display-stat-label">Missed</div>
              </div>
            </div>
 
            <div style="text-align:center;">
              <div class="display-section-title">Est. Wait Time</div>
              <div class="display-wait-time pulse">${data.est_wait_minutes || 0} min</div>
            </div>
 
            <div>
              <div class="display-section-title">Join Queue</div>
              <div class="display-qr-wrap">
                <img id="join-qr" src="${joinQR || `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(data.join_url)}`}" alt="Join QR" />
              </div>
              <div class="text-sm text-muted" style="margin-top:8px;">Scan to join</div>
            </div>
 
            <div class="text-sm text-muted" id="last-updated" style="font-size:0.72rem;">
              Updated ${new Date().toLocaleTimeString()}
            </div>
          </div>
        `;
      }
 
      function renderServingNumbers(serving, serving_entries) {
        if (!serving.length) return '<div class="text-muted text-sm">No one being served yet</div>';
        const entriesMap = Object.fromEntries((serving_entries || []).map(e => [e.queue_number, e]));
        return serving.map(n => {
          const entry = entriesMap[n];
          const isIn = !!entry?.entered_at;
          const badge = isIn
            ? `<span style="font-size:0.55rem;background:rgba(255,255,255,0.25);border-radius:4px;padding:2px 5px;display:block;margin-top:4px;letter-spacing:0.05em;">IN</span>`
            : `<span style="font-size:0.55rem;background:rgba(255,255,255,0.15);border-radius:4px;padding:2px 5px;display:block;margin-top:4px;letter-spacing:0.05em;">OUT</span>`;
          const bgStyle = isIn ? 'background:#22c55e;' : '';
          return `<div class="serving-number-big" style="display:flex;flex-direction:column;align-items:center;${bgStyle}">${n}${badge}</div>`;
        }).join('');
      }
 
      function updateDisplay(data, serving, waiting, missed, newlyServed) {
        const serving_entries = data.serving_entries || [];
        const servingEl = document.getElementById('serving-numbers');
        const waitingEl = document.getElementById('waiting-numbers');
        const missedEl  = document.getElementById('missed-numbers');

        if (servingEl) {
          if (!serving.length) {
            servingEl.innerHTML = '<div class="text-muted text-sm">No one being served yet</div>';
          } else {
            const entriesMap = Object.fromEntries(serving_entries.map(e => [e.queue_number, e]));
            servingEl.innerHTML = serving.map(n => {
              const entry = entriesMap[n];
              const isIn = !!entry?.entered_at;
              const badge = isIn
                ? `<span style="font-size:0.55rem;background:rgba(255,255,255,0.25);border-radius:4px;padding:2px 5px;display:block;margin-top:4px;letter-spacing:0.05em;">IN</span>`
                : `<span style="font-size:0.55rem;background:rgba(255,255,255,0.15);border-radius:4px;padding:2px 5px;display:block;margin-top:4px;letter-spacing:0.05em;">OUT</span>`;
              const bgStyle = isIn ? 'background:#22c55e;' : '';
              return `<div class="serving-number-big ${newlyServed.includes(n) ? 'pop-in' : ''}" style="display:flex;flex-direction:column;align-items:center;${bgStyle}">${n}${badge}</div>`;
            }).join('');
          }
        }
 
        if (waitingEl) {
          waitingEl.innerHTML = waiting.length
            ? waiting.map(n => `<div class="waiting-badge">${n}</div>`).join('')
            : '<span class="text-muted text-sm">Queue is empty</span>';
        }
 
        if (missedEl) {
          missedEl.innerHTML = missed.length
            ? `<div class="display-section-title" style="margin-top:16px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Missed (${missed.length})</div><div class="missed-row">${missed.map(n => `<div class="missed-badge">${n}</div>`).join('')}</div>`
            : '';
        }
 
        // Update stats
        const stats = document.querySelectorAll('.display-stat-num');
        if (stats[0]) stats[0].textContent = serving.length;
        if (stats[1]) stats[1].textContent = waiting.length;
        if (stats[2]) stats[2].textContent = data.total_served || 0;
        if (stats[3]) stats[3].textContent = missed.length;
 
        const waitEl = document.querySelector('.display-wait-time');
        if (waitEl) waitEl.textContent = `${data.est_wait_minutes || 0} min`;
 
        const tsEl = document.getElementById('last-updated');
        if (tsEl) tsEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      }
 
      refresh();
      setInterval(refresh, 5000);
    }
  </script>


        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js');
            }
        </script>

    </body>
