</head>

<body>

    <div id="topbar-root"></div>

    <div class="auth-page">
        <div class="glass auth-card">
            <div class="auth-title">Create account</div>
            <div class="auth-sub">Join HelloQueue – your account will be reviewed before activation</div>

            <form id="register-form">
                <div class="form-group">
                    <label for="display_name">Display Name</label>
                    <input type="text" id="display_name" placeholder="Augy the Fox" required />
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="augyfox" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required
                        autocomplete="new-password" />
                </div>
                <div id="reg-error"
                    style="color:var(--status-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
                <div id="reg-success"
                    style="color:var(--status-serving);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
                <button type="submit" class="btn btn-primary w-full" id="reg-btn">Create account</button>
            </form>

            <hr class="divider" />
            <div class="text-sm text-muted" style="text-align:center;">
                Already have an account? <a href="/login" class="auth-link">Sign in</a>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        import { initTheme, buildTopbar, api } from '/script.js';
        import { initGuestKey } from '/lib/gftv-request-signing.js';
    initTheme();
    buildTopbar(document.getElementById('topbar-root'));

    // Guest key signs the /api/auth/register call (register.js has verifySignedRequest)
    try { await initGuestKey('helloqueue-register'); } catch (e) { console.warn('Guest key init failed:', e.message); }
 
    const form = document.getElementById('register-form');
    const errEl = document.getElementById('reg-error');
    const sucEl = document.getElementById('reg-success');
    const btn = document.getElementById('reg-btn');
 
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      sucEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account…';
 
      try {
        await api('/auth/register', {
          method: 'POST',
          body: {
            display_name: document.getElementById('display_name').value.trim(),
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          },
        });
        sucEl.textContent = 'Account created! Please wait for an admin to approve your account.';
        sucEl.style.display = 'block';
        form.reset();
        btn.textContent = 'Done';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>

</html>
